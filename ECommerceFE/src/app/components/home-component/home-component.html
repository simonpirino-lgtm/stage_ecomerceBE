<div class="header-section">

  <!-- USER DROPDOWN -->
  <div class="user-info" *ngIf="user">
    <div class="user-row">
      <span class="username" (click)="toggleMenu($event)">
        👤 {{ user.userid }} - € {{ user.credito }}
      </span>
      <div class="dropdown-inline" *ngIf="showMenu">
        <span class="dropdown-item" (click)="goToProfile()">
          Account
        </span>
        <span class="dropdown-item logout" (click)="logout()">
          Logout
        </span>
      </div>
    </div>
  </div>

  <!-- TITLE + SEARCH -->
  <div class="nomecarrello">
    <h1 class="title">Benvenuto su GameStore!</h1>

    <div class="search-container">
      <input type="text" [(ngModel)]="searchTerm" placeholder="Cerca un gioco...">
    </div>
  </div>

  <!-- CART -->
  <button [routerLink]="['/carrello']">carrello</button>

</div>

<!-- PRODUCTS -->
<div class="container">
  @for(gioco of giochiFiltrati; track gioco.id) {
    <div class="product-card">
      
      <div class="image-wrapper">
        <img 
          [src]="gioco.image_url" 
          [alt]="gioco.titolo" 
          class="product-image"
          (mouseenter)="onMouseEnter($event, gioco)"
          (mousemove)="onMouseMove($event, gioco)"
          (mouseleave)="onMouseLeave(gioco)"
          [style.transform]="transforms[gioco.id] || ''"
        >
      </div>

      <div class="card-content">
        <h2 class="game-title">{{gioco.titolo}}</h2>
        <p class="price">€ {{gioco.prezzo}}</p>

        <button class="btn-add" (click)="aggiungiAlCarrello(gioco)">
          Aggiungi al Carrello
        </button>
      </div>

    </div>
  } @empty {
    <div class="no-results">
      <p>Nessun gioco trovato per "{{searchTerm}}"</p>
    </div>
  }
</div>
