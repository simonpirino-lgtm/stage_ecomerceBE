<div class="header-section">
  <h1 class="title">Benvenuto su GameStore!</h1>
  
  <!-- Il bottone ora seguirà l'allineamento a sinistra della sezione -->
  <a href="https://steampowered.com" class="custom-button">Carrello</a>
  
  <!-- La barra di ricerca -->
  <div class="search-container">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Cerca un gioco...">
  </div>
</div>

<div class="container">
  @for(gioco of giochiFiltrati; track gioco.id) {
    <div class="product-card">
      <div class="image-wrapper">
        <img [src]="gioco.image_url" [alt]="gioco.titolo" class="product-image">
      </div>
      <div class="card-content">
        <h2 class="game-title">{{gioco.titolo}}</h2>
        <p class="price">€ {{gioco.prezzo}}</p>
        <button class="btn-add">Aggiungi al Carrello</button>
      </div>
    </div>
  } @empty {
    <div class="no-results">
      <p>Nessun gioco trovato per "{{searchTerm}}"</p>
    </div>
  }
</div>
