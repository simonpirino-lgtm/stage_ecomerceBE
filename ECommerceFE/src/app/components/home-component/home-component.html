<div class="header-section">

  <!-- MENU -->
  <div class="menu-icon" (click)="toggleMenu($event)">
    ☰
  </div>

  <!-- CENTRO -->
  <div class="nomecarrello">
    <h1 class="title">Benvenuto su GameStore!</h1>

    <div class="search-row">
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        placeholder="Cerca un gioco..."
      >

      <select class="genre-select" [(ngModel)]="selectedGenre" (ngModelChange)="onCategoryChange($event)">
        <option value="">Tutti i generi</option>

        @for (genre of generi; track genre) {
          <option [value]="genre">{{ genre }}</option>
        }
      </select>
    </div>
  </div>

</div>

<!-- SIDEBAR -->
<div class="sidebar" [class.open]="showMenu">

  <div class="sidebar-header">👤 {{ user?.userid }}</div>

  <div class="sidebar-item" style="--i:1" (click)="goToProfile()">
    ⚙️ Account
  </div>

  <div class="sidebar-item" style="--i:2" (click)="goToCredit()">
    💰 Credito € {{ user?.credito }}
  </div>

  <div class="sidebar-item cart-item" style="--i:3" (click)="goToCart()">
    🛒 Carrello

    <span class="cart-badge" *ngIf="cartCount > 0">
      {{ cartCount }}
    </span>
  </div>

  <div class="sidebar-item logout" style="--i:4" (click)="logout()">
    ↪️ Logout
  </div>

</div>

<!-- CONTENUTO -->
<div class="main-content" [class.shift]="showMenu">
  <div class="container">
    <!-- @for(gioco of giochiFiltrati; track gioco.id)
    { -->
    @for(gioco of giochiFiltrati; track gioco.id) {
      <div class="product-card">

        <div class="image-wrapper">
          <!-- <img 
            [src]="gioco.image_url" 
            class="product-image"
            (mouseenter)="onMouseEnter($event, gioco)"
            (mousemove)="onMouseMove($event, gioco)"
            (mouseleave)="onMouseLeave(gioco)"
            [style.transform]="transforms[gioco.id] || ''"
          > -->
          <img 
            #gameImg
            [src]="gioco.image_url" 
            class="product-image"
            (mouseenter)="onMouseEnter($event, gioco)"
            (mousemove)="onMouseMove($event, gioco)"
            (mouseleave)="onMouseLeave(gioco)"
            [style.transform]="transforms[gioco.id] || ''"
          >
        </div>

        <div class="card-content">
          <h2 class="game-title">{{gioco.titolo}}</h2>
          <p class="price">€ {{gioco.prezzo}}</p><br>


          <button class="btn-add" (click)="aggiungiAlCarrello(gioco, gameImg)">
            Aggiungi al Carrello
          </button>
          <!-- <button class="btn-add" (click)="aggiungiAlCarrello(gioco)">
            Aggiungi al Carrello
          </button> -->
        </div>

      </div>
    }
  </div>
</div>
