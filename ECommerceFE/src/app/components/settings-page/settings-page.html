<div class="page-wrapper">
  <button class="back-btn" (click)="goBack()">
    <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>

  <div class="header-section">
    <h1 class="title">Impostazioni Account</h1>
  </div>

  <div class="credit-box">
    <div class="security-notice">
      <span class="icon">🔒</span>
      <p>Conferma i dati <strong>attuali</strong> per procedere alla modifica.</p>
    </div>

    <form (ngSubmit)="saveChanges()">
      <div class="form-group">
        <label>User ID Attuale</label>
        <input type="text" [(ngModel)]="userData.oldUserid" name="oldUserid" readonly style="opacity: 0.7; background: #d0d0d0;">
      </div>
      <div class="form-group">
        <label>Password Attuale</label>
        <input type="password" [(ngModel)]="userData.oldPassword" name="oldPassword" placeholder="Password attuale">
      </div>

      <hr class="divider" style="margin: 20px 0; border: 0; border-top: 1px solid rgba(0,0,0,0.1);">

      <div class="form-group">
        <label style="color: #1b5ed6;">Nuovo Username</label>
        <input type="text" [(ngModel)]="userData.newUserid" name="newUserid" placeholder="Nuovo username">
      </div>
      <div class="form-group">
        <label style="color: #1b5ed6;">Nuova Password</label>
        <input type="password" [(ngModel)]="userData.newPassword" name="newPassword" placeholder="Nuova password">
      </div>

      <button type="submit" class="save-btn">Aggiorna Credenziali</button>
    </form>

    <p *ngIf="message" [style.color]="isError ? 'red' : 'green'" style="text-align: center; margin-top: 15px; font-weight: bold;">
      {{ message }}
    </p>
  </div>
</div>
