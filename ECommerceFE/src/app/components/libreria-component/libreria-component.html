<div class="main-content">
  <div class="container">
    <h1 style="color: white; font-family: 'Orbitron', sans-serif; margin-bottom: 30px;">
      La Mia Libreria
    </h1>

    <div class="games-grid">
      @for (item of mieigiochi; track item.id) {
        <div class="product-card">
          
          <div class="image-wrapper">
            <img [src]="item.gioco?.image_url || 'assets/placeholder.jpg'" 
                 class="product-image" 
                 [alt]="item.gioco?.titolo">
          </div>

          <div class="card-content">
            <h2 class="game-title">{{ item.gioco?.titolo }}</h2>
            
            <p class="quantity">Posseduti: <strong>{{ item.quantita }}</strong></p>
            
            <button class="btn-play" (click)="scaricaGioco(item.gioco)">
              GIOCA ORA
            </button>
          </div>

        </div>
      } @empty {
        <div class="empty-library">
          <p style="color: #ccc; font-size: 1.2rem;">
            Non hai ancora acquistato nessun gioco. 
            <a routerLink="/home" style="color: #00ffcc; text-decoration: none;">Visita lo store!</a>
          </p>
        </div>
      }
    </div>
  </div>
</div>
