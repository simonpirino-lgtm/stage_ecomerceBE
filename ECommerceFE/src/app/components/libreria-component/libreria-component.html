<div class="main-content">
  <div class="container">
    <h1 style="color: white; width: 100%; margin-bottom: 20px; font-family: 'Orbitron', sans-serif;">
      I miei Giochi
    </h1>

    @if (isLoading) {
      <div style="color: #00ffcc;">Caricamento libreria...</div>
    }

    <div class="games-grid" style="display: flex; flex-wrap: wrap; gap: 20px;">
      @for (item of mieigiochi; track item.id) {
        <div class="product-card">
          <div class="image-wrapper">
            <img [src]="item.gioco?.image_url" class="product-image" [alt]="item.gioco?.titolo">
          </div>

          <div class="card-content">
            <h2 class="game-title">{{ item.gioco?.titolo }}</h2>
            <p class="price">Quantità: {{ item.quantita }}</p>
            
            <button 
              (click)="scaricaGioco(item.gioco)"
              class="btn-add" 
              style="background: linear-gradient(45deg, #28a745, #218838); border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%;">
              Scarica / Gioca
            </button>
          </div>
        </div>
      } @empty {
        @if (!isLoading) {
          <div style="color: white; padding: 20px; border: 1px dashed #555; width: 100%;">
            <h3>La tua libreria è vuota. Corri a comprare qualcosa! 🎮</h3>
          </div>
        }
      }
    </div>
  </div>
</div>
