<div class="admin-container">

  <button class="back-btn" [routerLink]="['/home']">
    <i class="fas fa-arrow-left"></i>
  </button>

  <h1>🎮 Gestione Giochi</h1>

  <!-- 🔍 SEARCH BAR -->
  

  <!-- FORM -->
  <div class="form-container" [class.editing]="inEditing()">

    <h2>
      {{ inEditing() ? 'Modifica Gioco' : 'Aggiungi Nuovo Gioco' }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <input type="text" formControlName="titolo" placeholder="Titolo" />
      <input type="number" formControlName="prezzo" placeholder="Prezzo" />
      <input type="date" formControlName="datarilascio" />
      <input type="text" formControlName="sviluppatore" placeholder="Sviluppatore" />
      <input type="text" formControlName="image_url" placeholder="URL Immagine" />
      <textarea formControlName="descrizione" placeholder="Descrizione"></textarea>
      <input type="text" formControlName="game_url" placeholder="URL Gioco" />

      <div class="form-buttons">
        <button type="submit">
          {{ inEditing() ? 'Aggiorna' : 'Crea' }}
        </button>

        @if (inEditing()) {
          <button type="button" (click)="annullaModifica()">
            Annulla
          </button>
        }
      </div>

    </form>
  </div>
<input
    class="search-bar"
    type="text"
    placeholder="Cerca gioco..."
    [value]="search()"
    (input)="search.set($any($event.target).value)"
  />
  <!-- LISTA -->
  <div class="giochi-list">

    @for (g of giochiFiltrati(); track g.id) {

      <div class="gioco-card" [class.editing]="inEditing()?.id === g.id">

        <img [src]="g.image_url" alt="{{ g.titolo }}" />

        <h3>{{ g.titolo }}</h3>

        <p class="prezzo">
          {{ g.prezzo | currency:'EUR' }}
        </p>

        <p>{{ g.sviluppatore }}</p>

        <p class="descrizione">
          {{ g.descrizione }}
        </p>

        @if (!inEditing()) {
          <div class="admin-actions">
            <button class="admin-btn edit" (click)="modifica(g)">✏️</button>
            <button class="admin-btn delete" (click)="elimina(g)">🗑️</button>
          </div>
        }

        @if (g.game_url) {
          <div class="admin-actions">
            <a [href]="g.game_url" target="_blank" class="admin-btn play">
              ▶ Gioca
            </a>
          </div>
        }

      </div>

    }

  </div>

</div>
