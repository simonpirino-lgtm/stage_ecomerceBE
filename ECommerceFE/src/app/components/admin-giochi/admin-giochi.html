<div class="admin-container">

  <h1>🎮 Gestione Giochi</h1>

  <!-- FORM -->
  <div class="form-container" [class.editing]="inEditing()">

    <h2>
      {{ inEditing() ? 'Modifica Gioco' : 'Aggiungi Nuovo Gioco' }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <input type="text" formControlName="titolo" placeholder="Titolo" />

      <input type="number" formControlName="prezzo" placeholder="Prezzo" />

      <input type="date" formControlName="datarilascio" />

      <input type="text" formControlName="sviluppatore" placeholder="Sviluppatore" />

      <input type="text" formControlName="image_url" placeholder="URL Immagine" />

      <textarea formControlName="descrizione" placeholder="Descrizione"></textarea>

      <div class="form-buttons">

        <button type="submit">
          {{ inEditing() ? 'Aggiorna' : 'Crea' }}
        </button>

        @if (inEditing()) {
          <button type="button" (click)="annullaModifica()">
            Annulla
          </button>
        }

      </div>

    </form>

  </div>

  <!-- LISTA GIOCHI -->
  <div class="giochi-list">

    @for (g of giochi(); track g.id) {

      <div class="gioco-card" [class.editing]="inEditing()?.id === g.id">

        <img [src]="g.image_url" alt="{{ g.titolo }}" />

        <h3>{{ g.titolo }}</h3>

        <p class="prezzo">
          {{ g.prezzo | currency:'EUR' }}
        </p>

        <p>{{ g.sviluppatore }}</p>

        <p class="descrizione">
          {{ g.descrizione }}
        </p>

        @if (isAdmin) {
          <div class="admin-actions">

            <button class="admin-btn edit" (click)="modifica(g)">
              ✏️ Modifica
            </button>

            <button class="admin-btn delete" (click)="elimina(g)">
              🗑️ Elimina
            </button>

          </div>
        }

      </div>

    }

  </div>

</div>
