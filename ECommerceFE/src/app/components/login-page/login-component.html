<div class="auth-container">

  <div class="flip-card" [class.flipped]="!isLogin">

    <!-- LOGIN -->
    <div class="flip-face front">

      <div class="auth-box" [class.shake]="shake">

        <h2>Login</h2>

        <form (ngSubmit)="onSubmit()">

          <input
            type="text"
            placeholder="Username"
            [(ngModel)]="form.userid"
            name="userid"
          />

          <input
            type="password"
            placeholder="Password"
            [(ngModel)]="form.password"
            name="password"
          />

          <button type="submit">Login</button>

        </form>

        <div class="error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <p class="switch">
          Non hai un account?
          <span class="link" (click)="toggleMode()">Registrati</span>
        </p>

      </div>
    </div>

    <!-- REGISTER -->
    <div class="flip-face back">

      <div class="auth-box" [class.shake]="shake">

        <h2>Register</h2>

        <form (ngSubmit)="onSubmit()">

          <input
            type="text"
            placeholder="Username"
            [(ngModel)]="form.userid"
            name="userid"
          />

          <input
            type="password"
            placeholder="Password"
            [(ngModel)]="form.password"
            name="password"
          />

          <button type="submit">Register</button>

        </form>

        <div class="error" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <p class="switch">
          Hai già un account?
          <span class="link" (click)="toggleMode()">Login</span>
        </p>

      </div>
    </div>

  </div>

</div>
